
name: Deploy doxygen docs

on:
  push:
    branches: ["main"]
  pull_request:
  release:
    types: [prereleased, released]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: ssciwr/doxygen-install@v2
        with:
          version: "1.16.1"
      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.31.0"  
          ninjaVersion: "^1.13.1"  
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install lcov
        run: sudo apt-get install -y lcov libsqlite3-dev
      - name: Run workflow to get coverage docs
        run:  cmake --fresh --preset docgen
      - name: Build project
        run:  cmake --build --preset docgen
      - name: Run tests
        run:  ctest --preset docgen
      - name: Build documentation
        run:  cmake --build --preset docgen --target doc
      - name: Build coverage docs
        run:  cmake --build --preset docgen --target coverage
      - name: Add coverage to docs
        run:  mv build/Linux/docgen/coverage/ build/Linux/docgen/doc/html/coverage
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'build/Linux/docgen/doc/html/'
      - name: Upload docs as release artifact
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v7
        with:
          name: docs-${{ github.ref_name }}
          path: 'build/Linux/docgen/doc/html/'


  deploy:
    needs: build
    if: github.event_name == 'release' && github.event.action == 'released'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
