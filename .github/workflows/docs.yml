
name: Deploy doxygen docs

on:
  push:
    tags:
      - 'v*'
    branches: ["main"]
  pull_request:

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: ssciwr/doxygen-install@v2
        with:
          version: "1.16.1"
      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.30.0"  # <--= optional, use most recent 3.25.x version
          ninjaVersion: "^1.11.1"  # <--= optional, use most recent 1.x version
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install lcov
        run: sudo apt-get install -y lcov libsqlite3-dev
      - name: Run workflow to get coverage docs
        run:  cmake --fresh --preset docgen
      - name: Build project
        run:  cmake --build --preset docgen
      - name: Run tests
        run:  ctest --preset docgen
      - name: Build documentation
        run:  cmake --build --preset docgen --target doc
      - name: Build coverage docs
        run:  cmake --build --preset docgen --target coverage
      - name: Add coverage to docs
        run:  mv build/Linux/docgen/coverage/ build/Linux/docgen/doc/html/coverage
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'build/Linux/docgen/doc/html/'


  deploy:
    needs: build
    # if: github.ref == 'refs/heads/main'
    # todo, switch to update pages only for new releases
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
