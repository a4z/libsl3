name: build with internal SQLite
on:
  push:
    branches:
    - main
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        build:
          - {
            os: ubuntu-latest,
            preset: ninja,

          }
          - {
            os: macos-latest,
            preset: xcode,

          }
          - {
            os: windows-2022,
            preset: msvc22,

          }
    runs-on: ${{ matrix.build.os }}
    steps:
    - uses: lukka/get-cmake@latest
      with:
        cmakeVersion: "~3.31.0"
        ninjaVersion: "^1.13.0"
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Setup MSVC
      if: startsWith(matrix.build.os, 'windows')
      uses: ilammy/msvc-dev-cmd@v1
    - name: Configure project
      run:  cmake --preset ${{ matrix.build.preset }} -DTOOLCHAIN_INCLUDES='toolchain/fetch-dependencies' -Dsl3_USE_INTERNAL_SQLITE3=ON
    - name: Build project
      run:  cmake --build --preset ${{ matrix.build.preset }}-release --parallel --verbose
    - name: Run unit test
      run:  ctest --preset ${{ matrix.build.preset }}-release --parallel


